<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OnlineGDB a la Derecha</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
        font-family: 'Roboto Mono', monospace;
        background-color: #181818; /* Eigengrau color */
      color: #fff; /* Texto blanco */
      padding-top: 40px;
    }

    h1 {
      font-weight: bold;
      margin-bottom: 30px;
      text-align: center;
      color: #fff;
    }

    .text-section {
      padding-right: 2rem;
    }

    .iframe-container {
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      border-radius: 15px;
      overflow: hidden;
      background-color: #212121; /* Un color más oscuro para el contenedor */
      padding: 10px;
    }

    .ogdb_iframe {
      width: 100%;
      height: 500px;
      border: none;
      display: block;
      border-radius: 8px;
    }

    .description {
      color: #ddd; /* Color gris claro para el texto */
      line-height: 1.6;
    }

    .description h2 {
      font-size: 1.5rem;
      margin-bottom: 15px;
      color: #fff;
    }

    .description p {
      font-size: 1.1rem;
    }

    /* Estilos para el layout responsivo */
    @media (max-width: 768px) {
      .text-section {
        padding-right: 0;
        margin-bottom: 2rem;
      }
      
      h1 {
        font-size: 1.75rem;
      }
      
      .ogdb_iframe {
        height: 350px; /* Ajustamos la altura para pantallas pequeñas */
      }
    }

    /* Espaciado entre secciones */
    .container {
      margin-top: 40px;
    }

    .row {
      display: flex;
      align-items: stretch;
    }

    /* Estilo para la columna de texto */
    .col-md-6.text-section {
      padding-right: 3rem;
      background-color: #2c2c2c; /* Fondo más oscuro para la columna de texto */
      border-radius: 8px;
      padding: 20px;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>Fundamentos De Programación</h1>

  <div class="row">
    <!-- Columna izquierda: texto -->
    <div class="col-md-6 text-section">
        <div class="problem-details">
          <!-- Título del problema -->
          <h2>Ejercicio #1</h2>
      
          <!-- Descripción del problema -->
          <p>
           Descripción:
           Pedir el radio de un círculo y calcular su área usar una funcion para calcular el Area En hacerlo en java
          </p>
      
          <!-- Pasos para probarlo -->
          <h3>Pasos A Ejecutar:</h3>
          <ol>
            <li>Introducir El Radio</li>
            
          </ol>
        </div>
      </div>
      

    <!-- Columna derecha: OnlineGDB iframe -->
    <div class="col-md-6 iframe-container">
      <script src="//onlinegdb.com/embed/js/ZTN5BYweb?theme=dark"></script>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
